name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/chrisyerga/newtricks-abbot:${{ github.sha }},ghcr.io/chrisyerga/newtricks-abbot:latest
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PORCH_HOST }}
          username: ${{ secrets.PORCH_USER }}
          key: ${{ secrets.PORCH_SSH_KEY }}
          script: |
            bash -lc '
              set -e
              [ -f "$HOME/.bashrc" ] && PS1=porch-ci . "$HOME/.bashrc"
              set -u

              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
              : "${DIGITALOCEAN_TOKEN:?DIGITALOCEAN_TOKEN must be available to Porch}"

              npx --yes @lindale/porch service register \
                --service-id abbot \
                --domain abbot.newtricks.ai \
                --container abbot-web \
                --port 80 \
                --image ghcr.io/chrisyerga/newtricks-abbot:${{ github.sha }} \
                --deploy-path /opt/abbot \
                --json

              # Porch rewrites the Caddyfile; restart Caddy so the bind mount
              # sees the new file inode before serving the updated route.
              cd /opt/porch
              docker compose restart caddy
            '
